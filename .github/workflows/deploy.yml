name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time, but don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache both the cargo registry and the build artifacts.
      # Keyed on Cargo.lock so the cache is invalidated when dependencies change.
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target/
          key: wasm-build-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            wasm-build-${{ hashFiles('**/Cargo.lock') }}-
            wasm-build-

      # bevy_cli is not on crates.io yet, so install from git.
      # Cached separately since it rarely changes.
      - name: Cache bevy_cli binary
        id: cache-bevy-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/bevy
          key: bevy-cli-${{ runner.os }}-main

      - name: Install bevy_cli
        if: steps.cache-bevy-cli.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/TheBevyFlock/bevy_cli --branch main --locked bevy_cli

      # wasm-bindgen-cli version must match the wasm-bindgen version used by Bevy.
      # bevy_cli installs it automatically; the --yes flag suppresses interactive prompts.
      - name: Build web bundle
        run: bevy build --release --yes web --bundle

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/bevy_web/web-release/kidnapped_robot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
